<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Monitoria da Qualidade</title>
    <style>
        :root {
            --planetun-dark: #0f172a;
            --planetun-blue: #2563eb;
            --planetun-border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #334155;
        }
        .login-container { width: 100%; max-width: 420px; padding: 16px; }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 48px 32px;
        }
        .brand-logo { text-align: center; margin-bottom: 24px; }
        .brand-logo img { height: 56px; border-radius: 6px; }
        .brand-title { text-align: center; color: #0f172a; font-weight: 800; font-size: 18px; margin-bottom: 4px; }
        .brand-subtitle { text-align: center; color: #64748b; font-size: 13px; margin-bottom: 32px; }
        .form-group { margin-bottom: 16px; }
        .form-label { font-size: 13px; font-weight: 600; color: #334155; display: block; margin-bottom: 4px; }
        .form-input {
            border: 1px solid var(--planetun-border); border-radius: 8px; padding: 10px 12px;
            font-size: 14px; width: 100%; transition: border 0.2s; font-family: inherit;
        }
        .form-input:focus { border-color: var(--planetun-blue); outline: none; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-login {
            background: var(--planetun-blue); color: #fff; border: none; border-radius: 8px;
            padding: 12px; font-weight: 600; font-size: 14px; width: 100%; cursor: pointer;
            transition: background 0.2s; margin-top: 8px;
        }
        .btn-login:hover { background: #1d4ed8; }
        .flash-error { background: #fee2e2; color: #991b1b; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand-logo">
                <img src="/static/logo_icon.png" alt="Planetun">
            </div>
            <div class="brand-title">Monitoria da Qualidade</div>
            <div class="brand-subtitle">Planetun</div>

            {% if erro %}
            <div class="flash-error">{{ erro }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label class="form-label" for="email">Email *</label>
                    <input class="form-input" type="email" id="email" name="email" placeholder="seu.nome@planetun.com.br" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="senha">Senha *</label>
                    <input class="form-input" type="password" id="senha" name="senha" required>
                </div>
                <button type="submit" class="btn-login">Acessar</button>
            </form>
        </div>
    </div>
</body>
</html>
