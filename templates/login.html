<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Monitoria da Qualidade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #00266d 0%, #003a8c 50%, #007dfe 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .login-container { width: 100%; max-width: 420px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); }
        .card-body { padding: 3rem 2rem; }
        .brand-logo { text-align: center; margin-bottom: 1.5rem; }
        .brand-logo img { height: 60px; border-radius: 6px; }
        .brand-title { text-align: center; color: #00266d; font-weight: 700; font-size: 1.1rem; margin-bottom: 0.3rem; }
        .brand-subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 2rem; }
        .form-label { font-weight: 600; color: #333; margin-bottom: 0.5rem; }
        .form-control { border: 1px solid #ddd; border-radius: 6px; padding: 0.75rem; font-size: 1rem; }
        .form-control:focus { border-color: #007dfe; box-shadow: 0 0 0 0.2rem rgba(0, 125, 254, 0.25); }
        .btn-login { background: linear-gradient(135deg, #007dfe, #00266d); border: none; border-radius: 6px; padding: 0.75rem; font-weight: 600; font-size: 1rem; width: 100%; margin-top: 1.5rem; color: white; transition: opacity 0.3s; }
        .btn-login:hover { opacity: 0.9; color: white; }
        .alert { border-radius: 6px; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card">
            <div class="card-body">
                <div class="brand-logo">
                    <img src="/static/logo_icon.png" alt="Planetun">
                </div>
                <div class="brand-title">Monitoria da Qualidade</div>
                <div class="brand-subtitle">Planetun</div>
                {% if erro %}
                <div class="alert alert-danger" role="alert">{{ erro }}</div>
                {% endif %}
                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="seu.nome@planetun.com.br" required>
                    </div>
                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" name="senha" required>
                    </div>
                    <button type="submit" class="btn btn-login">Acessar</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
